<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bf" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="88"/>
    </filter>
    <filter id="bfm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="64"/>
    </filter>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5b8c7"/>
      <stop offset="40%"  stop-color="#c6b5e0"/>
      <stop offset="100%" stop-color="#b3d0e8"/>
    </linearGradient>
    <linearGradient id="mg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a7d8c5"/>
      <stop offset="100%" stop-color="#f6c7a3"/>
    </linearGradient>
  </defs>

  <!-- Off-white base -->
  <rect width="1200" height="630" fill="#f9f8f6"/>

  <!-- Coloured blobs — same palette as about-hero -->
  <ellipse cx="60"   cy="60"  rx="380" ry="320" fill="#f5b8c7" opacity="0.78" filter="url(#bf)"/>
  <ellipse cx="1150" cy="80"  rx="360" ry="300" fill="#c6b5e0" opacity="0.72" filter="url(#bf)"/>
  <ellipse cx="80"   cy="590" rx="340" ry="290" fill="#f6c7a3" opacity="0.68" filter="url(#bf)"/>
  <ellipse cx="1140" cy="570" rx="340" ry="290" fill="#a7d8c5" opacity="0.68" filter="url(#bf)"/>
  <ellipse cx="600"  cy="315" rx="310" ry="270" fill="#b3d0e8" opacity="0.52" filter="url(#bfm)"/>

  <!-- Frosted overlay — softens blobs so text stays readable -->
  <rect width="1200" height="630" fill="rgba(249,248,246,0.42)"/>

  <!-- Subtle dot grid — top-left -->
  <g opacity="0.22" fill="#6b8fa8">
    <circle cx="72"  cy="72"  r="2.2"/><circle cx="108" cy="72"  r="2.2"/>
    <circle cx="144" cy="72"  r="2.2"/><circle cx="72"  cy="108" r="2.2"/>
    <circle cx="108" cy="108" r="2.2"/><circle cx="144" cy="108" r="2.2"/>
    <circle cx="72"  cy="144" r="2.2"/><circle cx="108" cy="144" r="2.2"/>
    <circle cx="144" cy="144" r="2.2"/>
  </g>
  <!-- Subtle dot grid — bottom-right -->
  <g opacity="0.22" fill="#6b8fa8">
    <circle cx="1056" cy="486" r="2.2"/><circle cx="1092" cy="486" r="2.2"/>
    <circle cx="1128" cy="486" r="2.2"/><circle cx="1056" cy="522" r="2.2"/>
    <circle cx="1092" cy="522" r="2.2"/><circle cx="1128" cy="522" r="2.2"/>
    <circle cx="1056" cy="558" r="2.2"/><circle cx="1092" cy="558" r="2.2"/>
    <circle cx="1128" cy="558" r="2.2"/>
  </g>

  <!-- Brand mark — gradient rounded square -->
  <rect x="548" y="112" width="104" height="104" rx="22" fill="url(#mg)"/>
  <!-- Inner shine -->
  <rect x="558" y="122" width="42" height="42" rx="10" fill="rgba(255,255,255,0.32)"/>

  <!-- Site name -->
  <text
    x="600" y="294"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="74"
    fill="#1c1410"
    text-anchor="middle"
    font-weight="400"
    letter-spacing="-1.5"
  >A Curious Note</text>

  <!-- Mono eyebrow -->
  <text
    x="600" y="340"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#567C94"
    text-anchor="middle"
    letter-spacing="4"
  >A SLOW BLOG BY SHERLY</text>

  <!-- Rainbow dot divider -->
  <circle cx="524" cy="386" r="4" fill="#f5b8c7"/>
  <circle cx="545" cy="386" r="4" fill="#d96b8a" opacity="0.8"/>
  <circle cx="566" cy="386" r="4" fill="#c6b5e0"/>
  <circle cx="587" cy="386" r="4" fill="#a07ab5" opacity="0.8"/>
  <circle cx="608" cy="386" r="4" fill="#b3d0e8"/>
  <circle cx="629" cy="386" r="4" fill="#6f9bd1" opacity="0.8"/>
  <circle cx="650" cy="386" r="4" fill="#a7d8c5"/>
  <circle cx="671" cy="386" r="4" fill="#6ba39a" opacity="0.8"/>
  <circle cx="692" cy="386" r="4" fill="#f6c7a3"/>

  <!-- Tagline -->
  <text
    x="600" y="446"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    fill="#4e3d30"
    text-anchor="middle"
    font-style="italic"
  >Animals · History · Astrophysics · Science · Languages</text>

  <!-- URL -->
  <text
    x="600" y="572"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#9a8878"
    text-anchor="middle"
    letter-spacing="1"
  >acuriousnote.com</text>
</svg>
