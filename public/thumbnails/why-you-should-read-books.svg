<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- open book -->
<g transform="translate(200,242)">
  <path d="M 0 -82 Q -122 -88 -142 -62 L -142 82 Q -122 56 0 62 Z" fill="var(--thumb-white)" opacity=".7" filter="drop-shadow(0 5px 15px rgba(152,105,211,.15))"/>
  <path d="M 0 -82 Q 122 -88 142 -62 L 142 82 Q 122 56 0 62 Z" fill="var(--thumb-white)" opacity=".7"/>
  <line x1="0" y1="-82" x2="0" y2="62" stroke="var(--thumb-lav-light)" stroke-width="3" opacity=".5"/>
  <g stroke="var(--thumb-lav-light)" stroke-width="1.2" opacity=".6">
    <line x1="-122" y1="-52" x2="-18" y2="-54"/><line x1="-122" y1="-36" x2="-18" y2="-37"/>
    <line x1="-122" y1="-20" x2="-18" y2="-20"/><line x1="-122" y1="-4" x2="-18" y2="-4"/>
    <line x1="-122" y1="12" x2="-18" y2="13"/><line x1="-122" y1="28" x2="-18" y2="30"/>
    <line x1="18" y1="-54" x2="122" y2="-52"/><line x1="18" y1="-37" x2="122" y2="-36"/>
    <line x1="18" y1="-20" x2="122" y2="-20"/><line x1="18" y1="-4" x2="122" y2="-4"/>
    <line x1="18" y1="13" x2="122" y2="12"/><line x1="18" y1="30" x2="122" y2="28"/>
  </g>
</g>
<!-- floating words -->
<g font-family="Georgia,serif" fill="var(--thumb-purple)" font-style="italic">
  <text x="58" y="98" font-size="24" opacity=".12">imagination</text>
  <text x="252" y="78" font-size="18" opacity=".1">wisdom</text>
  <text x="88" y="158" font-size="20" opacity=".1">empathy</text>
  <text x="282" y="138" font-size="16" opacity=".08">wonder</text>
</g>
<!-- bookmark -->
<polygon points="302,58 317,58 317,142 309,128 302,142" fill="var(--thumb-pink)" opacity=".55"/>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>