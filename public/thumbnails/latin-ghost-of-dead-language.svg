<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>
<radialGradient id="moon8" cx="80%" cy="20%" r="28%">
  <stop offset="0%" stop-color="var(--thumb-lav-light)" stop-opacity=".5"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- moon glow -->

<rect width="400" height="400" fill="url(#moon8)"/>
<!-- Roman columns -->
<g fill="var(--thumb-purple)" opacity=".22">
  <rect x="58" y="98" width="42" height="244"/>
  <rect x="50" y="88" width="58" height="19" rx="2"/>
  <rect x="50" y="334" width="58" height="19" rx="2"/>
  <rect x="158" y="118" width="42" height="224"/>
  <rect x="150" y="108" width="58" height="19" rx="2"/>
  <rect x="150" y="334" width="58" height="19" rx="2"/>
  <rect x="298" y="88" width="42" height="254"/>
  <rect x="290" y="78" width="58" height="19" rx="2"/>
  <rect x="290" y="334" width="58" height="19" rx="2"/>
</g>
<!-- architrave -->
<rect x="46" y="70" width="316" height="26" rx="2" fill="var(--thumb-purple)" opacity=".18"/>
<!-- floating Latin glyphs -->
<g font-family="Georgia,serif" font-style="italic" fill="var(--thumb-purple)">
  <text x="200" y="170" font-size="54" opacity=".12" text-anchor="middle">SPQR</text>
  <text x="182" y="258" font-size="30" opacity=".08" text-anchor="middle">alea</text>
  <text x="264" y="295" font-size="24" opacity=".07" text-anchor="middle">iacta</text>
  <text x="148" y="318" font-size="20" opacity=".06" text-anchor="middle">est</text>
</g>
<!-- moon -->
<circle cx="326" cy="78" r="30" fill="var(--thumb-lav-light)" opacity=".25"/>
<circle cx="340" cy="72" r="24" fill="rgba(245,243,239,.01)" opacity=".9"/>
<!-- stars -->
<g fill="var(--thumb-purple)" opacity=".4">
  <circle cx="98" cy="48" r="1.5"/><circle cx="222" cy="38" r="1"/><circle cx="352" cy="58" r="1.5"/>
  <circle cx="168" cy="28" r="1"/><circle cx="288" cy="44" r="1.2"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>