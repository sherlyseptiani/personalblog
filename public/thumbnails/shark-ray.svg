<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- caustic water shimmer -->
<g opacity=".18" stroke="var(--thumb-blue)" stroke-width=".8" fill="none">
  <path d="M0 110 Q80 98 160 114 Q240 130 320 108 Q370 98 400 108"/>
  <path d="M0 140 Q100 126 200 144 Q300 162 400 138"/>
  <path d="M0 170 Q90 157 185 174 Q290 192 400 165"/>
  <path d="M0 80 Q70 68 140 82 Q210 96 290 72 Q350 60 400 74"/>
</g>
<!-- bubbles -->
<g fill="var(--thumb-blue)" opacity=".3">
  <circle cx="55" cy="75" r="3.5"/><circle cx="330" cy="55" r="2.5"/><circle cx="145" cy="48" r="2"/>
  <circle cx="370" cy="95" r="3"/><circle cx="75" cy="135" r="2"/>
</g>
<!-- shark ray body -->
<g transform="translate(200,240)">
  <ellipse cx="0" cy="0" rx="148" ry="80" fill="var(--thumb-purple)" opacity=".18"/>
  <ellipse cx="-90" cy="0" rx="67" ry="60" fill="var(--thumb-purple)" opacity=".22"/>
  <ellipse cx="-143" cy="0" rx="28" ry="30" fill="var(--thumb-purple-dark)" opacity=".2"/>
  <path d="M 62 -22 Q 135 -14 162 0 Q 135 14 62 22 Z" fill="var(--thumb-purple-dark)" opacity=".18"/>
  <!-- dorsal fin -->
  <path d="M 28 -58 Q 72 -104 102 -60 L 62 -22 Z" fill="var(--thumb-purple-dark)" opacity=".25"/>
  <!-- tail -->
  <path d="M 162 0 Q 198 -40 220 -30 Q 226 0 220 30 Q 198 40 162 0 Z" fill="var(--thumb-purple-dark)" opacity=".22"/>
  <!-- pectoral fins outline -->
  <ellipse cx="-30" cy="0" rx="102" ry="92" fill="none" stroke="var(--thumb-purple)" stroke-width="1.5" opacity=".3"/>
  <!-- white spot pattern -->
  <circle cx="-108" cy="-18" r="5.5" fill="var(--thumb-white)"/><circle cx="-82" cy="15" r="4.5" fill="var(--thumb-white)"/>
  <circle cx="-62" cy="-28" r="4" fill="var(--thumb-white)"/><circle cx="-42" cy="24" r="6" fill="var(--thumb-white)"/>
  <circle cx="-22" cy="-16" r="4.5" fill="var(--thumb-white)"/><circle cx="6" cy="26" r="5" fill="var(--thumb-white)"/>
  <circle cx="26" cy="-20" r="3.5" fill="var(--thumb-white)"/><circle cx="-124" cy="9" r="4" fill="var(--thumb-white)"/>
  <circle cx="-98" cy="-35" r="3.5" fill="var(--thumb-white)"/>
  <!-- thorny dorsal ridges -->
  <ellipse cx="-78" cy="-60" rx="7.5" ry="12" fill="var(--thumb-blue)" opacity=".4"/>
  <ellipse cx="-50" cy="-61" rx="7" ry="11" fill="var(--thumb-blue)" opacity=".4"/>
  <ellipse cx="-24" cy="-61" rx="6.5" ry="10" fill="var(--thumb-blue)" opacity=".38"/>
  <ellipse cx="4" cy="-59" rx="5.5" ry="9" fill="var(--thumb-blue)" opacity=".35"/>
  <!-- eye -->
  <circle cx="-128" cy="-8" r="9" fill="var(--thumb-ink)"/>
  <circle cx="-128" cy="-8" r="5" fill="var(--thumb-purple-dark)" opacity=".6"/>
  <circle cx="-125" cy="-11" r="2.5" fill="var(--thumb-white-mid)"/>
  <!-- W-mouth -->
  <path d="M-160 10 Q-153 17 -146 10 Q-139 3 -132 10 Q-125 17 -118 10" fill="none" stroke="var(--thumb-white-mid)" stroke-width="1.8" stroke-linecap="round"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>