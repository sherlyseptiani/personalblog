<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- cage bars -->
<g stroke="var(--thumb-purple)" stroke-width="3" opacity=".25" fill="none">
  <line x1="75" y1="75" x2="75" y2="325"/>
  <line x1="128" y1="75" x2="128" y2="325"/>
  <line x1="181" y1="75" x2="181" y2="325"/>
  <line x1="234" y1="75" x2="234" y2="325"/>
  <line x1="287" y1="75" x2="287" y2="325"/>
  <line x1="340" y1="75" x2="340" y2="325"/>
  <line x1="55" y1="84" x2="358" y2="84"/>
  <line x1="55" y1="316" x2="358" y2="316"/>
</g>
<!-- broken bar -->
<line x1="181" y1="75" x2="177" y2="192" stroke="var(--thumb-teal)" stroke-width="3" opacity=".6"/>
<line x1="185" y1="258" x2="181" y2="325" stroke="var(--thumb-teal)" stroke-width="3" opacity=".6"/>
<circle cx="181" cy="222" r="5" fill="var(--thumb-teal)" opacity=".5"/>
<!-- bird flying free -->
<g transform="translate(268,155)" fill="none" stroke="var(--thumb-teal)" stroke-width="2.5" stroke-linecap="round">
  <path d="M 0 0 Q -22 -22 -38 -12"/>
  <path d="M 0 0 Q 22 -22 38 -12"/>
  <circle cx="0" cy="2" r="5.5" fill="var(--thumb-teal)" stroke="none" opacity=".7"/>
</g>
<!-- second bird -->
<g transform="translate(305,112)" fill="none" stroke="var(--thumb-teal)" stroke-width="1.8" stroke-linecap="round" opacity=".6">
  <path d="M 0 0 Q -15 -15 -27 -8"/>
  <path d="M 0 0 Q 15 -15 27 -8"/>
  <circle cx="0" cy="2" r="4" fill="var(--thumb-teal)" stroke="none" opacity=".7"/>
</g>
<!-- open book bottom -->
<g transform="translate(140,318)" opacity=".4">
  <rect x="-38" y="-24" width="76" height="48" rx="4" fill="var(--thumb-purple)" opacity=".35"/>
  <line x1="0" y1="-24" x2="0" y2="24" stroke="var(--thumb-purple-dark)" stroke-width="2" opacity=".5"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>