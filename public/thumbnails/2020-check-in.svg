<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- fireworks -->
<g>
  <g transform="translate(128,118)">
    <line x1="0" y1="0" x2="0" y2="-52" stroke="var(--thumb-pink)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="50" y2="-18" stroke="var(--thumb-pink)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="32" y2="42" stroke="var(--thumb-pink)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="-32" y2="42" stroke="var(--thumb-pink)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="-50" y2="-18" stroke="var(--thumb-pink)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="37" y2="-38" stroke="var(--thumb-pink)" stroke-width="1.4" opacity=".45"/>
    <line x1="0" y1="0" x2="-37" y2="-38" stroke="var(--thumb-pink)" stroke-width="1.4" opacity=".45"/>
    <circle cx="0" cy="0" r="6" fill="var(--thumb-pink)" opacity=".75"/>
  </g>
  <g transform="translate(278,98)">
    <line x1="0" y1="0" x2="0" y2="-44" stroke="var(--thumb-blue)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="42" y2="-15" stroke="var(--thumb-blue)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="27" y2="36" stroke="var(--thumb-blue)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="-27" y2="36" stroke="var(--thumb-blue)" stroke-width="1.8" opacity=".65"/>
    <line x1="0" y1="0" x2="-42" y2="-15" stroke="var(--thumb-blue)" stroke-width="1.8" opacity=".65"/>
    <circle cx="0" cy="0" r="6" fill="var(--thumb-blue)" opacity=".75"/>
  </g>
  <g transform="translate(200,58)" opacity=".6">
    <line x1="0" y1="0" x2="0" y2="-34" stroke="var(--thumb-lavender)" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="32" y2="-11" stroke="var(--thumb-lavender)" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="20" y2="27" stroke="var(--thumb-lavender)" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="-20" y2="27" stroke="var(--thumb-lavender)" stroke-width="1.4"/>
    <line x1="0" y1="0" x2="-32" y2="-11" stroke="var(--thumb-lavender)" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="4.5" fill="var(--thumb-lavender)"/>
  </g>
</g>
<!-- 2020 ghost -->
<text x="200" y="302" text-anchor="middle" font-family="Georgia,serif" font-size="92" fill="var(--thumb-purple)" opacity=".07" font-style="italic">2020</text>
<!-- mask subtle -->
<g transform="translate(200,338)" fill="none" stroke="var(--thumb-purple)" stroke-width="2" opacity=".2">
  <path d="M -42 0 Q -42 -25 0 -25 Q 42 -25 42 0 Q 42 20 0 20 Q -42 20 -42 0 Z"/>
  <line x1="-42" y1="-2" x2="-58" y2="-9"/>
  <line x1="42" y1="-2" x2="58" y2="-9"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>