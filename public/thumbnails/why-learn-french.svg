<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- Eiffel tower -->
<g transform="translate(200,410)" fill="var(--thumb-purple)" opacity=".55">
  <rect x="-58" y="-68" width="116" height="9" rx="2"/>
  <rect x="-42" y="-118" width="84" height="9" rx="2"/>
  <rect x="-24" y="-168" width="48" height="9" rx="2"/>
  <path d="M -58 -59 Q -52 -88 -24 -109 Q -22 -128 -14 -159" fill="none" stroke="var(--thumb-purple)" stroke-width="7" stroke-linecap="round" opacity=".55"/>
  <path d="M 58 -59 Q 52 -88 24 -109 Q 22 -128 14 -159" fill="none" stroke="var(--thumb-purple)" stroke-width="7" stroke-linecap="round" opacity=".55"/>
  <rect x="-5" y="-268" width="10" height="100" rx="2"/>
  <rect x="-3" y="-305" width="6" height="40" rx="1"/>
  <circle cx="0" cy="-308" r="5" fill="var(--thumb-lavender)"/>
  <line x1="-52" y1="-88" x2="52" y2="-88" stroke="var(--thumb-purple)" stroke-width="2.5" opacity=".4"/>
  <line x1="-36" y1="-138" x2="36" y2="-138" stroke="var(--thumb-purple)" stroke-width="2" opacity=".4"/>
</g>
<!-- speech bubble -->
<rect x="58" y="100" width="130" height="65" rx="16" fill="var(--thumb-white)" opacity=".65" filter="drop-shadow(0 4px 14px rgba(152,105,211,.2))"/>
<polygon points="78,165 65,188 105,165" fill="var(--thumb-white)" opacity=".65"/>
<!-- bonjour dots -->
<circle cx="92" cy="133" r="6" fill="var(--thumb-purple)" opacity=".5"/>
<circle cx="123" cy="133" r="6" fill="var(--thumb-lavender)" opacity=".45"/>
<circle cx="154" cy="133" r="6" fill="var(--thumb-pink)" opacity=".4"/>
<!-- fleur-de-lis -->
<g transform="translate(330,75)" fill="var(--thumb-pink)" opacity=".3">
  <ellipse cx="0" cy="-22" rx="9" ry="20"/>
  <ellipse cx="-15" cy="-9" rx="7" ry="15" transform="rotate(-30 -15 -9)"/>
  <ellipse cx="15" cy="-9" rx="7" ry="15" transform="rotate(30 15 -9)"/>
  <rect x="-5" y="0" width="10" height="18" rx="2"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>