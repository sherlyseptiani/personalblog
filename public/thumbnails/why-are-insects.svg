<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- prehistoric forest silhouette -->
<g fill="var(--thumb-teal)" opacity=".2">
  <rect x="0" y="202" width="22" height="198"/><rect x="32" y="162" width="18" height="238"/>
  <rect x="62" y="192" width="20" height="208"/><rect x="352" y="182" width="22" height="218"/>
  <rect x="372" y="222" width="20" height="178"/>
</g>
<!-- giant dragonfly -->
<g transform="translate(200,182)">
  <ellipse cx="0" cy="0" rx="6.5" ry="72" fill="var(--thumb-teal)" opacity=".55"/>
  <circle cx="0" cy="-77" r="15" fill="var(--thumb-teal)" opacity=".55"/>
  <!-- compound eyes -->
  <circle cx="-11" cy="-80" r="9" fill="var(--thumb-purple)" opacity=".55"/>
  <circle cx="11" cy="-80" r="9" fill="var(--thumb-purple)" opacity=".55"/>
  <!-- wings (4) -->
  <ellipse cx="-84" cy="-22" rx="86" ry="23" fill="var(--thumb-lavender)" opacity=".28" transform="rotate(-9 -84 -22)"/>
  <ellipse cx="84" cy="-22" rx="86" ry="23" fill="var(--thumb-lavender)" opacity=".28" transform="rotate(9 84 -22)"/>
  <ellipse cx="-74" cy="14" rx="76" ry="19" fill="var(--thumb-blue)" opacity=".22" transform="rotate(-6 -74 14)"/>
  <ellipse cx="74" cy="14" rx="76" ry="19" fill="var(--thumb-blue)" opacity=".22" transform="rotate(6 74 14)"/>
  <!-- wing venation -->
  <g stroke="var(--thumb-purple)" stroke-width=".9" opacity=".3" fill="none">
    <line x1="-4" y1="-20" x2="-162" y2="-30"/>
    <line x1="-4" y1="-10" x2="-142" y2="18"/>
    <line x1="4" y1="-20" x2="162" y2="-30"/>
    <line x1="4" y1="-10" x2="142" y2="18"/>
  </g>
  <!-- body segments -->
  <g stroke="var(--thumb-teal)" stroke-width="1.2" opacity=".4">
    <line x1="-5.5" y1="2" x2="5.5" y2="2"/><line x1="-5.5" y1="18" x2="5.5" y2="18"/>
    <line x1="-5.5" y1="34" x2="5.5" y2="34"/><line x1="-5.5" y1="50" x2="5.5" y2="50"/>
  </g>
</g>
<!-- tiny modern dragonfly -->
<g transform="translate(318,282) scale(.28)">
  <ellipse cx="0" cy="0" rx="6" ry="52" fill="var(--thumb-teal)" opacity=".6"/>
  <circle cx="0" cy="-57" r="11" fill="var(--thumb-teal)" opacity=".6"/>
  <ellipse cx="-52" cy="-14" rx="54" ry="15" fill="var(--thumb-lavender)" opacity=".35"/>
  <ellipse cx="52" cy="-14" rx="54" ry="15" fill="var(--thumb-lavender)" opacity=".35"/>
  <ellipse cx="-46" cy="10" rx="48" ry="13" fill="var(--thumb-blue)" opacity=".28"/>
  <ellipse cx="46" cy="10" rx="48" ry="13" fill="var(--thumb-blue)" opacity=".28"/>
</g>
<!-- O2 bar -->
<g transform="translate(58,342)" opacity=".4">
  <rect x="0" y="-9" width="124" height="9" rx="4.5" fill="var(--thumb-purple)" opacity=".2"/>
  <rect x="0" y="-9" width="86" height="9" rx="4.5" fill="var(--thumb-teal)" opacity=".55"/>
  <circle cx="86" cy="-4.5" r="4.5" fill="var(--thumb-lavender)"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>