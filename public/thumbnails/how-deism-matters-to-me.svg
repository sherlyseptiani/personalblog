<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>
<radialGradient id="lgt11" cx="50%" cy="18%" r="48%">
  <stop offset="0%" stop-color="var(--thumb-amber)" stop-opacity=".4"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>


<rect width="400" height="400" fill="url(#lgt11)"/>
<g opacity=".14" stroke="var(--thumb-amber)" stroke-width="1">
  <line x1="200" y1="0" x2="78" y2="400"/><line x1="200" y1="0" x2="138" y2="400"/>
  <line x1="200" y1="0" x2="200" y2="400"/><line x1="200" y1="0" x2="262" y2="400"/><line x1="200" y1="0" x2="322" y2="400"/>
</g>
<!-- cross -->
<g transform="translate(120,162)" stroke="var(--thumb-purple)" stroke-width="4.5" stroke-linecap="round" opacity=".45">
  <line x1="0" y1="-42" x2="0" y2="42"/><line x1="-26" y1="-10" x2="26" y2="-10"/>
</g>
<!-- crescent -->
<g transform="translate(280,142)" opacity=".45">
  <path d="M 0 -42 Q 48 0 0 42 Q 22 0 0 -42 Z" fill="none" stroke="var(--thumb-blue)" stroke-width="3.5"/>
  <circle cx="23" cy="-32" r="7" fill="var(--thumb-blue-light)" opacity=".6"/>
</g>
<!-- star of david -->
<g transform="translate(200,268)" fill="none" stroke="var(--thumb-teal)" stroke-width="2.8" opacity=".45">
  <polygon points="0,-34 -30,17 30,17"/>
  <polygon points="0,34 -30,-17 30,-17"/>
</g>
<!-- om faint -->
<text x="342" y="302" font-size="52" fill="var(--thumb-amber)" opacity=".12" font-family="serif">ॐ</text>
<!-- dharma wheel -->
<g transform="translate(68,302)" opacity=".22">
  <circle cx="0" cy="0" r="30" fill="none" stroke="var(--thumb-amber)" stroke-width="2.2"/>
  <circle cx="0" cy="0" r="11" fill="none" stroke="var(--thumb-amber)" stroke-width="2.2"/>
  <g stroke="var(--thumb-amber)" stroke-width="1.5">
    <line x1="0" y1="-30" x2="0" y2="-11"/><line x1="0" y1="11" x2="0" y2="30"/>
    <line x1="-30" y1="0" x2="-11" y2="0"/><line x1="11" y1="0" x2="30" y2="0"/>
    <line x1="-21" y1="-21" x2="-8" y2="-8"/><line x1="8" y1="8" x2="21" y2="21"/>
    <line x1="21" y1="-21" x2="8" y2="-8"/><line x1="-8" y1="8" x2="-21" y2="21"/>
  </g>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>