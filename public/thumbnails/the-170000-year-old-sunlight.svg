<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>
<radialGradient id="sun12" cx="50%" cy="50%" r="45%">
  <stop offset="0%" stop-color="var(--thumb-amber)" stop-opacity=".8"/>
  <stop offset="35%" stop-color="var(--thumb-pink)" stop-opacity=".4"/>
  <stop offset="70%" stop-color="var(--thumb-purple)" stop-opacity=".15"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>


<rect width="400" height="400" fill="url(#sun12)"/>
<!-- stars -->
<g fill="var(--thumb-purple)" opacity=".4">
  <circle cx="38" cy="28" r="1.2"/><circle cx="118" cy="58" r=".8"/><circle cx="352" cy="38" r="1"/>
  <circle cx="282" cy="18" r=".9"/><circle cx="382" cy="118" r="1.2"/><circle cx="18" cy="178" r=".8"/>
</g>
<!-- photon trail -->
<path d="M 200 200 Q 148 148 78 58" fill="none" stroke="var(--thumb-amber)" stroke-width="1.2" stroke-dasharray="5,7" opacity=".3"/>
<!-- sun core -->
<circle cx="200" cy="200" r="56" fill="var(--thumb-amber)" opacity=".5"/>
<circle cx="200" cy="200" r="40" fill="var(--thumb-pink-light)" opacity=".6"/>
<circle cx="200" cy="200" r="24" fill="var(--thumb-white)" opacity=".7"/>
<!-- corona loops -->
<g fill="none" stroke="var(--thumb-amber)" stroke-width="1.8" opacity=".45">
  <path d="M 200 144 Q 226 118 216 144"/>
  <path d="M 200 144 Q 174 118 184 144"/>
  <path d="M 256 200 Q 282 174 256 190"/>
  <path d="M 144 200 Q 118 174 144 190"/>
</g>
<!-- light ray to earth -->
<line x1="240" y1="228" x2="364" y2="382" stroke="var(--thumb-pink-light)" stroke-width="1.8" stroke-dasharray="9,11" opacity=".35"/>
<!-- earth -->
<circle cx="366" cy="385" r="15" fill="var(--thumb-blue)" opacity=".65"/>
<circle cx="366" cy="385" r="15" fill="none" stroke="var(--thumb-blue-light)" stroke-width="1" opacity=".5"/>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>