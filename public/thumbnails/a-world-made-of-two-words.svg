<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>

</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>

<!-- teapot -->
<g transform="translate(200,215)">
  <ellipse cx="0" cy="0" rx="72" ry="64" fill="var(--thumb-amber)" opacity=".45"/>
  <ellipse cx="0" cy="-64" rx="42" ry="13" fill="var(--thumb-amber)" opacity=".45"/>
  <ellipse cx="0" cy="-70" rx="15" ry="9" fill="var(--thumb-amber)" opacity=".5"/>
  <circle cx="0" cy="-76" r="7" fill="var(--thumb-purple-dark)" opacity=".5"/>
  <path d="M 64 -12 Q 104 -22 112 -7 Q 116 7 104 13 Q 90 18 72 8" fill="var(--thumb-amber)" opacity=".45"/>
  <path d="M -72 -22 Q -114 -22 -114 0 Q -114 22 -72 22" fill="none" stroke="var(--thumb-amber)" stroke-width="15" stroke-linecap="round" opacity=".45"/>
  <!-- floral decoration -->
  <circle cx="0" cy="0" r="20" fill="none" stroke="var(--thumb-pink-light)" stroke-width="1.8" opacity=".5"/>
  <g fill="var(--thumb-pink)" opacity=".45">
    <circle cx="0" cy="-22" r="5.5"/><circle cx="19" cy="9" r="5.5"/><circle cx="-19" cy="9" r="5.5"/>
  </g>
</g>
<!-- steam -->
<g stroke="var(--thumb-lavender)" stroke-width="2.2" fill="none" opacity=".4" stroke-linecap="round">
  <path d="M 168 118 Q 173 105 168 92 Q 163 79 168 66"/>
  <path d="M 200 113 Q 205 100 200 87 Q 195 74 200 61"/>
  <path d="M 232 118 Q 237 105 232 92 Q 227 79 232 66"/>
</g>
<!-- teacup -->
<g transform="translate(316,306)">
  <path d="M -32 0 Q -30 26 0 29 Q 30 26 32 0 Z" fill="var(--thumb-amber)" opacity=".5"/>
  <ellipse cx="0" cy="0" rx="32" ry="11" fill="var(--thumb-purple-dark)" opacity=".4"/>
  <path d="M 32 8 Q 50 8 50 18 Q 50 28 32 25" fill="none" stroke="var(--thumb-amber)" stroke-width="6" stroke-linecap="round" opacity=".5"/>
</g>
<!-- globe outline -->
<circle cx="78" cy="98" r="47" fill="none" stroke="var(--thumb-purple)" stroke-width="1.5" opacity=".3"/>
<ellipse cx="78" cy="98" rx="20" ry="47" fill="none" stroke="var(--thumb-purple)" stroke-width="1" opacity=".22"/>
<line x1="31" y1="98" x2="125" y2="98" stroke="var(--thumb-purple)" stroke-width="1" opacity=".18"/>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>