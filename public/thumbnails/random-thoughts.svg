<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>
<radialGradient id="drp5" cx="50%" cy="45%" r="52%">
  <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".55"/>
  <stop offset="60%" stop-color="var(--thumb-purple)" stop-opacity=".25"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>


<rect width="400" height="400" fill="url(#drp5)"/>
<!-- island silhouettes -->
<g fill="var(--thumb-blue)" opacity=".18">
  <ellipse cx="200" cy="305" rx="158" ry="26"/>
  <ellipse cx="118" cy="295" rx="78" ry="21"/>
  <ellipse cx="298" cy="299" rx="68" ry="19"/>
</g>
<!-- large water drop -->
<g transform="translate(200,200)">
  <path d="M 0 -118 Q 62 -38 62 22 Q 62 82 0 92 Q -62 82 -62 22 Q -62 -38 0 -118 Z" fill="var(--thumb-blue)" opacity=".35"/>
  <path d="M 0 -118 Q 62 -38 62 22 Q 62 82 0 92 Q -62 82 -62 22 Q -62 -38 0 -118 Z" fill="none" stroke="var(--thumb-blue-light)" stroke-width="1.5" opacity=".5"/>
  <!-- highlight -->
  <path d="M -17 -78 Q -7 -100 7 -84" fill="none" stroke="var(--thumb-white)" stroke-width="4.5" stroke-linecap="round"/>
  <ellipse cx="0" cy="22" rx="28" ry="36" fill="var(--thumb-white-subtle)"/>
</g>
<!-- ripples -->
<g fill="none" stroke="var(--thumb-blue)" stroke-width="1.5" opacity=".3">
  <ellipse cx="200" cy="316" rx="52" ry="13"/>
  <ellipse cx="200" cy="316" rx="84" ry="21"/>
  <ellipse cx="200" cy="316" rx="120" ry="30"/>
</g>
<!-- small drops -->
<g fill="var(--thumb-purple)" opacity=".4">
  <path d="M 98 138 Q 102 122 106 138 Q 106 151 98 151 Q 90 151 90 138 Q 94 122 98 138 Z"/>
  <path d="M 302 118 Q 305 105 308 118 Q 308 128 302 128 Q 296 128 296 118 Q 299 105 302 118 Z"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>