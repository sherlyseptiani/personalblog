<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<style>
:root {
  --thumb-purple: #9869D3;
  --thumb-purple-dark: #7048B0;
  --thumb-lavender: #C4A8E8;
  --thumb-lav-light: #E0D4F8;
  --thumb-pink: #E8A0C0;
  --thumb-pink-light: #F4D0E4;
  --thumb-blue: #8CA8D8;
  --thumb-blue-light: #C4D8F4;
  --thumb-teal: #6BA39A;
  --thumb-amber: #C08A64;
  --thumb-ink: rgba(15,10,40,0.75);
  --thumb-ink-light: rgba(15,10,40,0.45);
  --thumb-white: rgba(255,255,255,0.9);
  --thumb-white-mid: rgba(255,255,255,0.5);
  --thumb-white-subtle: rgba(255,255,255,0.2);
}
</style>
<defs>
  <radialGradient id="gbg1" cx="30%" cy="25%" r="60%">
    <stop offset="0%" stop-color="var(--thumb-lavender)" stop-opacity=".35"/>
    <stop offset="100%" stop-color="var(--thumb-lavender)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg2" cx="75%" cy="70%" r="55%">
    <stop offset="0%" stop-color="var(--thumb-pink)" stop-opacity=".28"/>
    <stop offset="100%" stop-color="var(--thumb-pink)" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gbg3" cx="60%" cy="20%" r="50%">
    <stop offset="0%" stop-color="var(--thumb-blue)" stop-opacity=".22"/>
    <stop offset="100%" stop-color="var(--thumb-blue)" stop-opacity="0"/>
  </radialGradient>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r=".8" fill="var(--thumb-purple)" opacity=".12"/>
  </pattern>
  <radialGradient id="gvig" cx="50%" cy="50%" r="50%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(100,80,160,0.1)"/>
  </radialGradient>
<radialGradient id="crglow" cx="50%" cy="48%" r="38%">
  <stop offset="0%" stop-color="var(--thumb-amber)" stop-opacity=".3"/>
  <stop offset="100%" stop-color="transparent"/>
</radialGradient>
</defs>
  <rect width="400" height="400" fill="rgba(245,243,239,0.01)"/>
  <rect width="400" height="400" fill="url(#gbg1)"/>
  <rect width="400" height="400" fill="url(#gbg2)"/>
  <rect width="400" height="400" fill="url(#gbg3)"/>
  <rect width="400" height="400" fill="url(#dots)"/>


<rect width="400" height="400" fill="url(#crglow)"/>
<!-- Union Jack subtle -->
<g opacity=".06" stroke="var(--thumb-blue)" stroke-width="1.5">
  <line x1="0" y1="0" x2="400" y2="400"/><line x1="400" y1="0" x2="0" y2="400"/>
  <line x1="200" y1="0" x2="200" y2="400"/><line x1="0" y1="200" x2="400" y2="200"/>
</g>
<!-- crown -->
<g transform="translate(200,205)">
  <rect x="-92" y="18" width="184" height="52" rx="5" fill="var(--thumb-amber)" opacity=".55"/>
  <g fill="var(--thumb-ink)" opacity=".2">
    <circle cx="-72" cy="44" r="3.5"/><circle cx="-46" cy="44" r="3.5"/><circle cx="-20" cy="44" r="3.5"/>
    <circle cx="6" cy="44" r="3.5"/><circle cx="32" cy="44" r="3.5"/><circle cx="58" cy="44" r="3.5"/><circle cx="84" cy="44" r="3.5"/>
  </g>
  <polygon points="-92,18 -76,-22 -60,18" fill="var(--thumb-amber)" opacity=".55"/>
  <polygon points="-46,18 -30,-40 -14,18" fill="var(--thumb-amber)" opacity=".55"/>
  <polygon points="0,18 0,-55 14,18" fill="var(--thumb-amber)" opacity=".55"/>
  <polygon points="46,18 30,-40 62,18" fill="var(--thumb-amber)" opacity=".55"/>
  <polygon points="92,18 76,-22 60,18" fill="var(--thumb-amber)" opacity=".55"/>
  <!-- gems -->
  <circle cx="-76" cy="-18" r="7" fill="var(--thumb-pink)" opacity=".8"/>
  <circle cx="-30" cy="-36" r="7" fill="var(--thumb-blue)" opacity=".8"/>
  <circle cx="0" cy="-51" r="9" fill="var(--thumb-lavender)" opacity=".9"/>
  <circle cx="30" cy="-36" r="7" fill="var(--thumb-blue)" opacity=".8"/>
  <circle cx="76" cy="-18" r="7" fill="var(--thumb-pink)" opacity=".8"/>
  <!-- cross top -->
  <rect x="-4.5" y="-74" width="9" height="26" rx="2" fill="var(--thumb-amber)" opacity=".6"/>
  <rect x="-13" y="-64" width="26" height="8" rx="2" fill="var(--thumb-amber)" opacity=".6"/>
  <circle cx="0" cy="-74" r="6" fill="var(--thumb-lavender)" opacity=".8"/>
</g>
  <rect width="400" height="400" fill="url(#gvig)"/>
</svg>